<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Theme Calculator</title>
  <link rel="stylesheet" href="multi-theme-cal.css">
</head>
<body class="theme-start">
  <div class="background-blobs" id="bg-blobs">
    <div class="blob color1"></div>
    <div class="blob color2"></div>
    <div class="blob color3"></div>
  </div>
  
  <div class="theme-selector" id="theme-selector">
    <h1>Select Theme</h1>
    <button class="theme-btn" onclick="startApp('theme-glassmorphism')">Glassmorphism</button>
    <button class="theme-btn" onclick="startApp('theme-neobrutalism')">Neo Brutalism</button>
    <button class="theme-btn" onclick="startApp('theme-minimalism')">Minimalism</button>
    <button class="theme-btn" onclick="startApp('theme-colorfulism')">Colorfulism</button>
    <button class="theme-btn" onclick="startApp('theme-neumorphism')">Neumorphism</button>
  </div>

  <div class="calculator hidden" id="calculator">
    <div class="display" id="display">0</div>
    <div class="buttons">
      <button class="btn clear" onclick="clearDisplay()">AC</button>
      <button class="btn operator" onclick="deleteLast()">DEL</button>
      <button class="btn operator" onclick="appendOperator('%')">%</button>
      <button class="btn operator" onclick="appendOperator('/')">÷</button>

      <button class="btn" onclick="appendNumber('7')">7</button>
      <button class="btn" onclick="appendNumber('8')">8</button>
      <button class="btn" onclick="appendNumber('9')">9</button>
      <button class="btn operator" onclick="appendOperator('*')">×</button>

      <button class="btn" onclick="appendNumber('4')">4</button>
      <button class="btn" onclick="appendNumber('5')">5</button>
      <button class="btn" onclick="appendNumber('6')">6</button>
      <button class="btn operator" onclick="appendOperator('-')">−</button>

      <button class="btn" onclick="appendNumber('1')">1</button>
      <button class="btn" onclick="appendNumber('2')">2</button>
      <button class="btn" onclick="appendNumber('3')">3</button>
      <button class="btn operator" onclick="appendOperator('+')">+</button>

      <button class="btn zero" onclick="appendNumber('0')">0</button>
      <button class="btn" onclick="appendNumber('.')">.</button>
      <button class="btn equals" onclick="calculate()">=</button>
    </div>
    
    <button class="back-btn" onclick="goBack()">Change Theme</button>
  </div>

  <script src="multi-theme-cal.js"></script>
</body>
</html>
